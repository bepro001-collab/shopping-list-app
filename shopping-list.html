<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-top: 4px;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area button {
      padding: 10px 18px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-area button:hover {
      background: #4338ca;
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-bar button {
      padding: 5px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 20px;
      background: white;
      color: #6b7280;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      border-color: #4f46e5;
      background: #ede9fe;
      color: #4f46e5;
      font-weight: 600;
    }

    .list {
      padding: 8px 0;
      min-height: 80px;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 40px 20px;
      font-size: 0.9rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      transition: background 0.15s;
    }

    .item:hover {
      background: #f9fafb;
    }

    .item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: color 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .item .delete-btn {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .item .delete-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.82rem;
      color: #9ca3af;
    }

    footer button {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    footer button:hover {
      background: #fee2e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>쇼핑 리스트</h1>
      <p id="summary">아이템 0개</p>
    </header>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="아이템 이름 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">미완료</button>
      <button onclick="setFilter('checked', this)">완료</button>
    </div>

    <div class="list" id="list"></div>

    <footer>
      <span id="countText">남은 아이템: 0개</span>
      <button onclick="clearChecked()">완료 항목 삭제</button>
    </footer>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('shopping-list', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const filtered = items.filter(item => {
        if (filter === 'active') return !item.checked;
        if (filter === 'checked') return item.checked;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">아이템이 없습니다.</div>';
      } else {
        list.innerHTML = filtered.map(item => `
          <div class="item ${item.checked ? 'checked' : ''}" id="item-${item.id}">
            <input type="checkbox" ${item.checked ? 'checked' : ''}
              onchange="toggleItem(${item.id})" />
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" onclick="deleteItem(${item.id})" title="삭제">&#10005;</button>
          </div>
        `).join('');
      }

      const remaining = items.filter(i => !i.checked).length;
      document.getElementById('countText').textContent = `남은 아이템: ${remaining}개`;
      document.getElementById('summary').textContent =
        `전체 ${items.length}개 · 완료 ${items.length - remaining}개`;
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ id: Date.now(), text, checked: false });
      input.value = '';
      save();
      render();
      input.focus();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (item) item.checked = !item.checked;
      save();
      render();
    }

    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                 .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
